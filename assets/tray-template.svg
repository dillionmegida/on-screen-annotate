<svg width="20" height="20" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
  <!-- Simple pen icon for menu bar - monochrome template -->
  <g transform="translate(10, 10) rotate(-45)">
    <!-- Pen body -->
    <rect x="-7" y="-1" width="14" height="2" rx="1" fill="black"/>
    <!-- Pen tip -->
    <path d="M 7,-1 L 9,-0.5 L 9,0.5 L 7,1 Z" fill="black"/>
    <!-- Ink dot -->
    <circle cx="8.5" cy="0" r="0.5" fill="black"/>
  </g>
</svg>
